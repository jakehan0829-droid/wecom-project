version: '3.9'
services:
  # 数据库服务
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: chronic_disease
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存服务
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: chronic_disease
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}  # 从环境变量读取，默认postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-replace_me_with_secure_random_string_in_production}
      WECOM_CORP_ID: ${WECOM_CORP_ID:-wwopenclawdemo001}
      WECOM_AGENT_ID: ${WECOM_AGENT_ID:-1000002}
      WECOM_SECRET: ${WECOM_SECRET:-demo_secret_123456}
      WECOM_TOKEN: ${WECOM_TOKEN:-openclaw-demo-token}
      WECOM_AES_KEY: ${WECOM_AES_KEY:-rs7wJpwNlXFnPLYHWo2q/FzywfBMCK2d0I70Mcvi5mw=}
      AI_PROVIDER: ${AI_PROVIDER:-openai-codex}
      AI_MODEL: ${AI_MODEL:-gpt-5.4}
      AI_API_KEY: ${AI_API_KEY:-sk-35136ffb95857141c5c2e424b1f4682cc7871bbf448a7af1c0295e5d2fe91735}
      AI_BASE_URL: ${AI_BASE_URL:-https://www.open1.codes/v1}
    env_file:
      - ../backend/.env.production
    ports:
      - "3000:3000"
    volumes:
      - ./backend/.env.production:/app/.env:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {if (r.statusCode === 200) process.exit(0); else process.exit(1)}).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
    env_file:
      - ../frontend/.env.production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data: